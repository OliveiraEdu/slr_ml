services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./inputs:/app/inputs
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # The API now waits for the worker to report as 'healthy' 
    # rather than just 'started'.
    depends_on:
      ml-worker:
        condition: service_healthy
    networks:
      - slr-network

  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
    restart: on-failure
    ports:
      - "8001:8001"
    volumes:
      - ./config:/app/config
      - ./inputs:/app/inputs
      - ./outputs:/app/outputs
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_CACHE=/app/models
    networks:
      - slr-network

networks:
  slr-network:
    driver: bridge