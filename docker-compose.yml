version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./inputs:/app/inputs
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - ml-worker
    networks:
      - slr-network

  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
    volumes:
      - ./config:/app/config
      - ./inputs:/app/inputs
      - ./outputs:/app/outputs
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_CACHE=/app/models
    networks:
      - slr-network

networks:
  slr-network:
    driver: bridge
