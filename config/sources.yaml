# Data Sources Configuration
# Configure input files and arXiv queries for the SLR engine

sources:
  # Web of Science - user-provided files
  # Use import-directory endpoint to load multiple files
  wos:
    enabled: true
    format: "bibtex"

  # IEEE Xplore - user-provided files
  ieee:
    enabled: true
    format: "csv"

  # ACM Digital Library - user-provided files
  acm:
    enabled: true
    format: "bibtex"

  # Scopus - user-provided files
  scopus:
    enabled: true
    format: "csv"

  # arXiv - API queries
  arxiv:
    enabled: false
    max_results: 100
    queries:
      - query: "machine actionable data management plan blockchain provenance"
        max_results: 50
      - query: "scientific data provenance blockchain"
        max_results: 50

  # DOI Metadata - CrossRef and DataCite APIs
  # Used for enriching papers with citation counts, references, etc.
  doi:
    enabled: true
    # Optional email for higher rate limits (50/sec vs 10/sec)
    # Highly recommended for CrossRef: https://api.crossref.org/swagger-ui/index.html
    email: ""
    # Rate limit in seconds between requests (0.1 = 10/sec)
    rate_limit: 0.1
    # Skip papers that already have citation counts
    skip_existing: true
