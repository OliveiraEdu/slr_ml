# Data Sources Configuration
# Configure input files and arXiv queries for the SLR engine

sources:
  # Web of Science - user-provided files
  # Use import-directory endpoint to load multiple files
  wos:
    enabled: true
    format: "bibtex"

  # IEEE Xplore - user-provided files
  ieee:
    enabled: true
    format: "csv"

  # ACM Digital Library - user-provided files
  acm:
    enabled: true
    format: "bibtex"

  # Scopus - user-provided files
  scopus:
    enabled: true
    format: "csv"

  # arXiv - API queries
  arxiv:
    enabled: false
    max_results: 100
    queries:
      - query: "machine actionable data management plan blockchain provenance"
        max_results: 50
      - query: "scientific data provenance blockchain"
        max_results: 50
