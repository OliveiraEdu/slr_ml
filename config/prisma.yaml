# PRISMA 2020 Configuration
# Settings for PRISMA flow diagram generation and reporting

prisma:
  # Review type
  review_type: "original"  # original or update

  # Exclusion reasons for title/abstract screening
  title_abstract_exclusion_reasons:
    # Relevance exclusions
    - "Not relevant to maDMP/blockchain research question"
    - "No blockchain component"
    - "No data management plan component"
    - "No provenance tracking"
    - # Study type exclusions
    - "Opinion/editorial piece"
    - "Non-empirical contribution"
    - "Literature review only"
    - # Context exclusions
    - "Wrong domain (supply chain, finance only)"
    - "Not about scientific/research data"
    - # Practical exclusions
    - "Full text not available"
    - "Duplicate publication"
    - "Not in English"
    - "Conference abstract only"
    - "Published before 2018"
    - "Other"

  # Exclusion reasons for full-text screening
  full_text_exclusion_reasons:
    # Relevance exclusions (refined after full-text review)
    - "No maDMP implementation"
    - "No blockchain implementation"
    - "No verifiable provenance mechanism"
    - "Pure provenance without blockchain"
    - "Blockchain not applied to scientific data"
    # Quality exclusions
    - "No technical implementation details"
    - "Insufficient evaluation/methodology"
    - "Results not applicable"
    # Practical exclusions
    - "Full text not available"
    - "Duplicate publication"
    - "Wrong context"
    - "Protocol paper only"
    - "Other"

  # Inclusion criteria
  inclusion_criteria:
    - "Relevant to PICOC"
    - "Primary empirical study"
    - "Peer-reviewed"
    - "Published in included timeframe"

  # Report settings
  report:
    include_flow_diagram: true
    include_table_studies: true
    include_summary_statistics: true

  # Output formats
  output:
    flow_diagram: "json"  # json, csv
    statistics: "json"
    export_path: "outputs/prisma"

  # Reviewers (for audit trail)
  reviewers:
    primary: ""
    secondary: ""
    conflict_resolution: ""
